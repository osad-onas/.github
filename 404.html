  <style>
    :root {
      --bg:          #0d1117;
      --border:      #30363d;
      --border-mute: #21262d;
      --fg:          #e6edf3;
      --fg-strong:   #f0f6fc;
      --fg-muted:    #9198a1;
      --accent:      #58a6ff;        --green:       #238636; 
      --green-hover: #2ea043;
      --blurple:     #5865F2;  /    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans",
                   Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      min-height: 100svh;
      overflow-x: hidden;
    }

    
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 720px 320px at 50% -10%, rgba(88, 166, 255, .13), transparent 70%),
        radial-gradient(ellipse 480px 260px at 82% 0%, rgba(88, 101, 242, .08), transparent 70%);
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px;
      animation: fade-up .55s ease-out both;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    
    .bridge {
      display: flex;
      align-items: center;
      gap: clamp(16px, 4vw, 28px);
      margin-bottom: 44px;
    }

    .bridge .github-mark {
      width: clamp(44px, 9vw, 54px);
      height: auto;
      fill: var(--fg-strong);
    }

    .bridge .discord-mark {
      width: clamp(52px, 10vw, 64px);
      height: auto;
      /* drop-shadow повторяет контур иконки; цвет подобран под её оранжевый */
      filter: drop-shadow(0 0 14px rgba(219, 148, 69, .45));
    }

    
    .track {
      position: relative;
      width: clamp(72px, 22vw, 170px);
      height: 2px;
      background: repeating-linear-gradient(90deg,
        var(--border) 0 6px, transparent 6px 13px);
    }

    
    .track i {
      position: absolute;
      top: 50%;
      left: 0;
      width: 6px;
      height: 6px;
      margin-top: -3px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0;
      animation: travel 2.4s linear infinite;
    }
    .track i:nth-child(2) { animation-delay: .8s; }
    .track i:nth-child(3) { animation-delay: 1.6s; }

    @keyframes travel {
      0%   { left: -3px; opacity: 0; }
      15%  { opacity: 1; }
      80%  { opacity: 1; }
      100% { left: calc(100% - 3px); opacity: 0; }
    }

    
    h1 {
      font-size: clamp(28px, 6vw, 40px);
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--fg-strong);
      margin-bottom: 10px;
    }

    
    h1 .dots span {
      animation: blink 1.4s infinite both;
    }
    h1 .dots span:nth-child(2) { animation-delay: .2s; }
    h1 .dots span:nth-child(3) { animation-delay: .4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: .25; }
      40%           { opacity: 1; }
    }

    .subtitle {
      font-size: 16px;
      color: var(--fg-muted);
      max-width: 46ch;
      line-height: 1.5;
      margin-bottom: 0;
    }

    
    footer {
      padding: 20px 24px;
      border-top: 1px solid var(--border-mute);
      text-align: center;
      font-size: 12px;
      color: var(--fg-muted);
      position: relative;
    }
    footer a {
      color: var(--fg-muted);
      text-decoration: none;
    }
    footer a:hover { color: var(--accent); }

    
    @media (prefers-reduced-motion: reduce) {
      main            { animation: none; }
      .track i        { animation: none; opacity: 0; }
      h1 .dots span   { animation: none; opacity: 1; }
    }
  </style>
</head>
